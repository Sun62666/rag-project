services:
  etcd:
    container_name: rag-etcd
    image: quay.io/coreos/etcd:v3.5.5
    restart: always
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./volumes/etcd:/etcd
    command: ["etcd", "-advertise-client-urls=http://0.0.0.0:2379", "-listen-client-urls=http://0.0.0.0:2379", "--data-dir", "/etcd"]
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - rag-network

  minio:
    container_name: rag-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    restart: always
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./volumes/minio:/data
    command: ["minio", "server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - rag-network

  milvus-standalone:
    container_name: rag-milvus
    image: milvusdb/milvus:v2.4.13
    restart: always
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 5s
      start_period: 60s
      timeout: 3s
      retries: 10
    ports:
      - "19530:19530"
      - "9091:9091"
    networks:
      - rag-network
  attu:
    container_name: attu
    image: zilliz/attu:v2.4.12
    restart: always
    ports:
      - "8000:3000"
    environment:
      MILVUS_URL: milvus-standalone:19530
    depends_on:
      milvus-standalone:
        condition: service_healthy


  redis:
    container_name: rag-redis
    image: redis/redis-stack:latest
    restart: always
    volumes:
      - ./volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5
    ports:
      - "6379:6379"
    networks:
      - rag-network

  redis-insight:
    container_name: rag-redis-insight
    image: redis/redisinsight:latest
    restart: always
    ports:
      - "8001:5540"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - rag-network

networks:
  rag-network:
    name: rag-network
    driver: bridge